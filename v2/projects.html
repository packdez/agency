  <style>
    :root {
      --green: #298e55;
      --green-dim: rgba(41,142,85,0.15);
      --green-glow: rgba(41,142,85,0.35);
      --bg: #080a09;
      --surface: #0f1210;
      --surface2: #161a17;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(41,142,85,0.5);
      --text: #f0f2f1;
      --text-muted: rgba(240,242,241,0.45);
      --text-dim: rgba(240,242,241,0.7);
      --radius: 16px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── AMBIENT BACKGROUND ── */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .ambient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .ambient-orb:nth-child(1) {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #298e55, transparent);
      top: -200px; right: -100px;
      animation-duration: 22s;
    }
    .ambient-orb:nth-child(2) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #1a5d38, transparent);
      bottom: -100px; left: -100px;
      animation-duration: 18s;
      animation-delay: -8s;
    }
    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── PAGE SHELL ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      padding: 32px 48px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeDown 0.7s cubic-bezier(.2,.8,.2,1) both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-img {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }
    .logo-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .header-back {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
      padding: 8px 0;
    }
    .header-back:hover { color: var(--text); }
    .header-back svg { width: 15px; height: 15px; transition: transform 0.2s; }
    .header-back:hover svg { transform: translateX(-3px); }

    /* ── HERO TEXT ── */
    .hero {
      padding: 56px 48px 40px;
      animation: fadeUp 0.8s 0.1s cubic-bezier(.2,.8,.2,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hero-label::before {
      content: '';
      display: inline-block;
      width: 20px; height: 1.5px;
      background: var(--green);
    }
    .hero-title {
      font-size: clamp(36px, 5vw, 60px);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.035em;
      color: var(--text);
      max-width: 700px;
    }
    .hero-title span { color: var(--green); }

    /* ── FILTERS ── */
    .filters-wrap {
      padding: 0 48px 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      animation: fadeUp 0.8s 0.2s cubic-bezier(.2,.8,.2,1) both;
    }
    .filter-pill {
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(.2,.8,.2,1);
      letter-spacing: -0.01em;
    }
    .filter-pill:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
    }
    .filter-pill.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
      box-shadow: 0 0 20px var(--green-glow);
    }

    /* ── GRID ── */
    .grid-wrap {
      padding: 0 48px 80px;
      flex: 1;
      animation: fadeUp 0.8s 0.3s cubic-bezier(.2,.8,.2,1) both;
    }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* ── PROJECT CARD ── */
    .project-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      text-align: left;
      font: inherit;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition:
        transform 0.4s cubic-bezier(.2,.8,.2,1),
        border-color 0.3s,
        box-shadow 0.4s cubic-bezier(.2,.8,.2,1);
      will-change: transform;
    }
    .project-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: var(--border-hover);
      box-shadow:
        0 0 0 1px var(--border-hover),
        0 20px 60px rgba(0,0,0,0.5),
        0 0 40px var(--green-dim);
    }

    /* card enter animation */
    .project-card {
      opacity: 0;
      animation: cardIn 0.55s cubic-bezier(.2,.8,.2,1) forwards;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #111;
    }
    .card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(.2,.8,.2,1), filter 0.4s;
      filter: brightness(0.85) saturate(0.9);
    }
    .project-card:hover .card-thumb img {
      transform: scale(1.06);
      filter: brightness(1) saturate(1);
    }
    .card-thumb-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 35%, rgba(8,10,9,0.75) 100%);
      transition: opacity 0.3s;
    }
    .play-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      width: 54px; height: 54px;
      border-radius: 50%;
      background: rgba(8,10,9,0.65);
      border: 1.5px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s cubic-bezier(.2,.8,.2,1), background 0.3s;
    }
    .project-card:hover .play-btn {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      background: rgba(41,142,85,0.85);
      border-color: var(--green);
    }
    .play-btn svg { margin-left: 3px; }

    .card-cat {
      position: absolute;
      top: 12px; left: 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--green);
      background: rgba(8,10,9,0.75);
      border: 1px solid rgba(41,142,85,0.3);
      padding: 4px 10px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }

    .card-body {
      padding: 20px 22px 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      letter-spacing: -0.015em;
      margin-bottom: 8px;
      transition: color 0.2s;
    }
    .project-card:hover .card-title { color: #fff; }
    .card-desc {
      font-size: 13.5px;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 18px;
      flex: 1;
      transition: color 0.2s;
    }
    .project-card:hover .card-desc { color: var(--text-dim); }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .card-stats {
      display: flex;
      gap: 14px;
    }
    .card-stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      transition: color 0.2s;
    }
    .project-card:hover .card-stat { color: var(--text-dim); }
    .card-stat svg { width: 13px; height: 13px; }
    .card-arrow {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: all 0.3s cubic-bezier(.2,.8,.2,1);
    }
    .project-card:hover .card-arrow {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      transform: rotate(45deg);
      box-shadow: 0 0 16px var(--green-glow);
    }
    .card-arrow svg { width: 14px; height: 14px; }

    /* ── EMPTY / LOADING ── */
    .state-msg {
      grid-column: 1/-1;
      padding: 80px 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* skeleton */
    .skel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: cardIn 0.55s cubic-bezier(.2,.8,.2,1) forwards;
    }
    .skel { background: linear-gradient(90deg, var(--surface2) 0%, #1e2520 50%, var(--surface2) 100%); background-size: 200% 100%; animation: shimmer 1.6s infinite; }
    .skel-thumb { aspect-ratio: 16/9; }
    .skel-body { padding: 20px 22px; }
    .skel-line { height: 12px; border-radius: 6px; margin-bottom: 10px; }
    .skel-line.w60 { width: 60%; }
    .skel-line.w40 { width: 40%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(5,8,6,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 500;
      display: none;
      animation: bdin 0.3s ease both;
    }
    .modal-backdrop.show { display: block; }
    @keyframes bdin { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      position: fixed;
      inset: 20px;
      z-index: 501;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: none;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
      animation: modalIn 0.4s cubic-bezier(.2,.8,.2,1) both;
      max-width: 1400px;
      margin: 0 auto;
    }
    .modal.show { display: flex; }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.96) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }
    .modal-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .modal-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .icon-btn:hover:not(:disabled) {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      box-shadow: 0 0 16px var(--green-glow);
    }
    .icon-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .icon-btn.close:hover {
      background: #c0392b;
      border-color: #c0392b;
      box-shadow: none;
      transform: rotate(90deg);
    }
    .icon-btn svg { width: 17px; height: 17px; }

    /* dropdown */
    .proj-dropdown { position: relative; max-width: 260px; width: 100%; }
    .proj-drop-btn {
      width: 100%; height: 38px; padding: 0 12px;
      border-radius: 10px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; cursor: pointer;
      font-size: 13.5px; font-weight: 500;
      color: var(--text-dim);
      font-family: inherit;
      transition: all 0.2s;
    }
    .proj-drop-btn:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }
    .proj-drop-btn.open { border-color: var(--green); color: var(--text); box-shadow: 0 0 0 1px var(--green); }
    .proj-drop-btn svg { width: 14px; height: 14px; flex-shrink: 0; transition: transform 0.2s; }
    .proj-drop-btn.open svg { transform: rotate(180deg); }

    .proj-drop-menu {
      position: absolute;
      top: calc(100% + 8px); left: 0; right: 0;
      min-width: 280px;
      background: #111714;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      display: none;
      flex-direction: column;
      z-index: 100;
      overflow: hidden;
      animation: dropIn 0.2s cubic-bezier(.2,.8,.2,1) both;
    }
    .proj-drop-menu.show { display: flex; }
    @keyframes dropIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    .drop-search { padding: 10px; border-bottom: 1px solid var(--border); }
    .drop-search input {
      width: 100%; padding: 8px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px; font-family: inherit; color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .drop-search input::placeholder { color: var(--text-muted); }
    .drop-search input:focus { border-color: var(--green); }
    .drop-list { overflow-y: auto; max-height: 300px; }
    .drop-list::-webkit-scrollbar { width: 4px; }
    .drop-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .drop-item {
      padding: 11px 14px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s;
    }
    .drop-item:hover { background: rgba(255,255,255,0.04); }
    .drop-item.active { background: var(--green-dim); }
    .drop-item:last-child { border-bottom: none; }
    .drop-item-title { font-size: 13.5px; font-weight: 500; color: var(--text-dim); margin-bottom: 2px; }
    .drop-item.active .drop-item-title { color: #6cdb97; }
    .drop-item-cat { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    .drop-no-results { padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px; }

    /* modal body */
    .modal-body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 400px;
      overflow: hidden;
    }

    /* video pane */
    .video-pane {
      background: #060806;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px;
      gap: 16px;
      overflow-y: auto;
    }
    .video-wrap {
      width: 100%;
      max-width: 800px;
      position: relative;
      padding-bottom: 56.25%;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    }
    .video-wrap iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      animation: fadeIn 0.4s ease both;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .video-skel-box { width: 100%; max-width: 800px; }
    .video-skel-screen { aspect-ratio: 16/9; border-radius: 12px; }

    .creator-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 800px;
    }
    .creator-av {
      width: 40px; height: 40px; border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid rgba(255,255,255,0.1);
    }
    .creator-name { font-size: 13.5px; font-weight: 600; color: var(--text-dim); }
    .creator-role { font-size: 12px; color: var(--text-muted); }

    /* details pane */
    .details-pane {
      border-left: 1px solid var(--border);
      padding: 28px 26px;
      overflow-y: auto;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .details-pane::-webkit-scrollbar { width: 4px; }
    .details-pane::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 2px; }

    .d-cat {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--green); margin-bottom: 10px;
    }
    .d-title {
      font-size: 22px; font-weight: 700; line-height: 1.25;
      letter-spacing: -0.02em; color: var(--text);
      margin-bottom: 22px;
    }

    .d-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-bottom: 16px;
    }
    .d-stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      transition: border-color 0.2s;
    }
    .d-stat:hover { border-color: rgba(41,142,85,0.3); }
    .d-stat-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted);
      display: flex; align-items: center; gap: 5px; margin-bottom: 6px;
    }
    .d-stat-label svg { width: 12px; height: 12px; }
    .d-stat-val {
      font-size: 22px; font-weight: 700; color: var(--text);
      letter-spacing: -0.02em;
      transition: all 0.3s;
    }
    .d-stat-val.pop { animation: popVal 0.4s cubic-bezier(.2,.8,.2,1); }
    @keyframes popVal {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); color: var(--green); }
    }

    .like-btn {
      width: 100%; display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 12px;
      border-radius: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--text-dim);
      font-size: 13.5px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.25s;
      margin-bottom: 18px;
    }
    .like-btn:hover:not(:disabled) {
      border-color: var(--green); background: var(--green-dim); color: #6cdb97;
    }
    .like-btn:disabled {
      background: rgba(41,142,85,0.2); border-color: var(--green);
      color: #6cdb97; cursor: default;
    }
    .like-btn svg { width: 16px; height: 16px; }
    .like-btn svg.filled { fill: currentColor; }

    .d-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .d-block:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-1px); }
    .d-block:last-child { margin-bottom: 0; }
    .d-block-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--green); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .d-block-label::before {
      content: ''; width: 2px; height: 11px;
      background: var(--green); border-radius: 1px;
    }
    .d-block-text {
      font-size: 13.5px; line-height: 1.65; color: var(--text-dim);
    }
    .d-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px; padding: 9px 14px;
      background: var(--green); color: #fff;
      border-radius: 999px; font-size: 13px; font-weight: 600;
      text-decoration: none;
      transition: box-shadow 0.2s, transform 0.2s, opacity 0.2s;
    }
    .d-link:hover {
      box-shadow: 0 0 20px var(--green-glow);
      transform: translateY(-1px);
      opacity: 0.92;
    }
    .d-link svg { width: 13px; height: 13px; }

    /* ── SHARE MODAL ── */
    .share-overlay {
      position: fixed; inset: 0;
      background: rgba(5,8,6,0.8);
      backdrop-filter: blur(14px);
      display: none;
      align-items: center; justify-content: center;
      padding: 20px;
      z-index: 600;
      animation: bdin 0.2s ease both;
    }
    .share-overlay.show { display: flex; }
    .share-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%; max-width: 440px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      animation: modalIn 0.25s cubic-bezier(.2,.8,.2,1) both;
    }
    .share-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px; border-bottom: 1px solid var(--border);
    }
    .share-head-title { font-size: 17px; font-weight: 700; color: var(--text); }
    .share-proj-info {
      padding: 14px 22px;
      background: var(--green-dim);
      border-bottom: 1px solid var(--border);
    }
    .share-proj-cat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--green); margin-bottom: 4px; }
    .share-proj-title { font-size: 15px; font-weight: 600; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .share-opts { padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    .share-opt {
      display: flex; align-items: center; gap: 14px;
      padding: 14px; border-radius: 12px;
      border: 1px solid var(--border); background: transparent;
      cursor: pointer; font-family: inherit; text-align: left;
      transition: all 0.2s; text-decoration: none;
    }
    .share-opt:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .share-opt.li:hover { border-color: #0077b5; background: rgba(0,119,181,0.08); }
    .share-opt.tw:hover { border-color: #fff; background: rgba(255,255,255,0.05); }
    .share-opt.fb:hover { border-color: #1877f2; background: rgba(24,119,242,0.08); }
    .share-opt.cp:hover, .share-opt.copied { border-color: var(--green); background: var(--green-dim); }
    .share-ico {
      width: 42px; height: 42px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
    }
    .share-opt.li .share-ico { background: rgba(0,119,181,0.12); color: #0077b5; }
    .share-opt.li:hover .share-ico { background: #0077b5; color: #fff; }
    .share-opt.tw .share-ico { background: rgba(255,255,255,0.07); color: var(--text); }
    .share-opt.tw:hover .share-ico { background: #111; color: #fff; }
    .share-opt.fb .share-ico { background: rgba(24,119,242,0.12); color: #1877f2; }
    .share-opt.fb:hover .share-ico { background: #1877f2; color: #fff; }
    .share-opt.cp .share-ico { background: var(--green-dim); color: var(--green); }
    .share-opt.cp:hover .share-ico, .share-opt.copied .share-ico { background: var(--green); color: #fff; }
    .share-ico svg { width: 20px; height: 20px; }
    .share-opt-label { font-size: 14px; font-weight: 600; color: var(--text-dim); margin-bottom: 2px; }
    .share-opt-sub { font-size: 12px; color: var(--text-muted); }
    .share-opt.li:hover .share-opt-label { color: #0077b5; }
    .share-opt.tw:hover .share-opt-label { color: var(--text); }
    .share-opt.fb:hover .share-opt-label { color: #1877f2; }
    .share-opt.cp:hover .share-opt-label, .share-opt.copied .share-opt-label { color: var(--green); }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .modal-body { grid-template-columns: 1fr 360px; }
    }
    @media (max-width: 900px) {
      .modal-body { grid-template-columns: 1fr; }
      .details-pane { border-left: none; border-top: 1px solid var(--border); }
      .video-pane { padding: 20px; justify-content: flex-start; }
    }
    @media (max-width: 768px) {
      .header { padding: 24px 20px 0; }
      .hero { padding: 36px 20px 28px; }
      .filters-wrap { padding: 0 20px 28px; }
      .grid-wrap { padding: 0 20px 60px; }
      .projects-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
      .modal { inset: 10px; border-radius: 16px; }
      .modal-header { padding: 12px 14px; }
      .proj-dropdown { max-width: 180px; }
      .details-pane { padding: 20px 18px; }
      .d-title { font-size: 19px; }
    }
    @media (max-width: 520px) {
      .projects-grid { grid-template-columns: 1fr; }
      .modal { inset: 6px; border-radius: 14px; }
      .proj-dropdown { max-width: 140px; }
      .proj-drop-btn { font-size: 12px; padding: 0 10px; }
    }
  </style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5KLXPS5M" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <!-- Modal Header -->

        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>

      <div class="creator-row">
        <img src="https://raw.githubusercontent.com/packdez/agency/refs/heads/main/assets/Raphael_Levinders-removebg-preview.png" alt="Raphael Levinders" class="creator-av">

<!-- SHARE MODAL -->
<div class="share-overlay" id="shareOverlay" onclick="closeShareOnBg(event)">
  <div class="share-box" onclick="event.stopPropagation()">
    <div class="share-head">
      <span class="share-head-title">Share Project</span>
      <button class="icon-btn close" onclick="closeShare()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="share-proj-info">
      <div class="share-proj-cat" id="sCat"></div>
      <div class="share-proj-title" id="sTitle"></div>
    </div>
    <div class="share-opts">
      <button class="share-opt li" onclick="shareLI()">
        <div class="share-ico"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></div>
        <div><div class="share-opt-label">LinkedIn</div><div class="share-opt-sub">Share with your network</div></div>
      </button>
      <button class="share-opt tw" onclick="shareTW()">
        <div class="share-ico"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div>
        <div><div class="share-opt-label">X (Twitter)</div><div class="share-opt-sub">Post to your followers</div></div>
      </button>
      <button class="share-opt fb" onclick="shareFB()">
        <div class="share-ico"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></div>
        <div><div class="share-opt-label">Facebook</div><div class="share-opt-sub">Share with friends</div></div>
      </button>
      <button class="share-opt cp" id="cpBtn" onclick="copyLink()">
        <div class="share-ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></div>
        <div><div class="share-opt-label" id="cpLabel">Copy Link</div><div class="share-opt-sub" id="cpSub">Copy URL to clipboard</div></div>
      </button>
    </div>

</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwhnvFEbtgvgXfV7hUr_WKtHRTtfR8RI9PZcUL-DhW9WCngld9N4HwQIxtZol4IY3eV/exec';
  const BASE_URL = window.location.origin + window.location.pathname;
  const BUF_KEY = 'event_buffer';
  const SV_KEY = 'session_views';

  let projects = [], currentIdx = 0, fp = '';

  /* ── UTILS ── */
  function fmt(n) {
    if (n < 1000) return String(n);
    if (n < 1e6) return (n/1000).toFixed(1).replace(/\.0$/,'')+'k';
    return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M';
  }
  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }
  function ytThumb(id) { return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }
  function projUrl(p) { return `${BASE_URL}?project=${encodeURIComponent(p.id)}`; }

  /* ── FINGERPRINT ── */
  function getFP() {
    let v = localStorage.getItem('user_fp');
    if (!v) { v = crypto.randomUUID(); localStorage.setItem('user_fp', v); }
    return v;
  }

  /* ── EVENT BUFFER ── */
  function getBuf() { return JSON.parse(localStorage.getItem(BUF_KEY) || '[]'); }
  function addBuf(ev) { const b = getBuf(); b.push(ev); if (b.length > 100) b.shift(); localStorage.setItem(BUF_KEY, JSON.stringify(b)); }
  function clearBuf() { localStorage.removeItem(BUF_KEY); }
  function sendEv(type, pid, meta={}) {
    addBuf({ project_id: pid, type, ts: Date.now(), meta });
    (window.dataLayer = window.dataLayer || []).push({ event:'works_interaction', action:type, project_id:pid, meta });
  }
  async function syncBuf() {
    const evs = getBuf(); if (!evs.length) return;
    const payload = { action:'sync', events:evs, user_fingerprint:fp, user_agent:navigator.userAgent };
    clearBuf();
    try { await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(payload) }); }
    catch { localStorage.setItem(BUF_KEY, JSON.stringify(evs)); navigator.sendBeacon(GAS_URL, JSON.stringify(payload)); }
  }

  function hasViewed(id) { return JSON.parse(sessionStorage.getItem(SV_KEY)||'[]').includes(String(id)); }
  function markViewed(id) {
    const v = JSON.parse(sessionStorage.getItem(SV_KEY)||'[]');
    if (!v.includes(String(id))) v.push(String(id));
    sessionStorage.setItem(SV_KEY, JSON.stringify(v));
  }

  /* ── LOAD PROJECTS ── */
  async function loadProjects() {
    try {
      const res = await fetch(GAS_URL);
      projects = await res.json() || [];
      buildFilters();
      renderGrid(projects);
      populateDrop();
      // deep link
      const pid = new URLSearchParams(window.location.search).get('project');
      if (pid) {
        const idx = projects.findIndex(p => String(p.id) === String(pid));
        if (idx !== -1) { currentIdx = idx; openModal(); renderDetail(); }
      }
    } catch(e) {
      document.getElementById('projectsGrid').innerHTML = '<div class="state-msg">Unable to load projects. Please try again shortly.</div>';
    }
  }

  /* ── FILTERS ── */
  let activeFilter = 'all';
  function buildFilters() {
    const cats = [...new Set(projects.map(p=>p.category).filter(Boolean))];
    const wrap = document.getElementById('filtersWrap');
    wrap.innerHTML = `<button class="filter-pill active" data-filter="all">All</button>` +
      cats.map(c => `<button class="filter-pill" data-filter="${esc(c)}">${esc(c)}</button>`).join('');
    wrap.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        wrap.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        const shown = activeFilter === 'all' ? projects : projects.filter(p => p.category === activeFilter);
        renderGrid(shown);
      });
    });
  }

  /* ── GRID ── */
  function renderGrid(list) {
    const grid = document.getElementById('projectsGrid');
    if (!list.length) { grid.innerHTML = '<div class="state-msg">No projects found.</div>'; return; }
    grid.innerHTML = list.map((p, i) => {
      const realIdx = projects.findIndex(r => r.id === p.id);
      return `
        <button class="project-card" style="animation-delay:${i * 60}ms" onclick="openCard(${realIdx})" aria-label="${esc(p.title)}">
          <div class="card-thumb">
            <img src="${ytThumb(p.videoId)}" alt="${esc(p.title)}" loading="lazy" onerror="this.style.display='none'">
            <div class="card-thumb-overlay"></div>
            <div class="play-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
            <div class="card-cat">${esc(p.category||'Project')}</div>
          </div>
          <div class="card-body">
            <div class="card-title">${esc(p.title)}</div>
            <div class="card-desc">${esc(p.description||'')}</div>
            <div class="card-footer">
              <div class="card-stats">
                <span class="card-stat">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  ${fmt(p.views||0)}
                </span>
                <span class="card-stat">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                  ${fmt(p.likes||0)}
                </span>
              </div>
              <div class="card-arrow">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7" stroke-width="2" stroke-linecap="round"/><polyline points="7 7 17 7 17 17" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
            </div>
          </div>
        </button>`;
    }).join('');
  }

  /* ── MODAL OPEN/CLOSE ── */
  function openCard(idx) {
    currentIdx = idx;
    openModal();
    renderDetail();
    const p = projects[idx];
    window.history.pushState({}, '', `${BASE_URL}?project=${encodeURIComponent(p.id)}`);
  }
  function openModal() {
    document.getElementById('backdrop').classList.add('show');
    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    document.getElementById('backdrop').classList.remove('show');
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = '';
    window.history.pushState({}, '', BASE_URL);
  }

  /* ── DROPDOWN ── */
  function populateDrop() {
    document.getElementById('dropList').innerHTML = projects.map((p, i) => `
      <div class="drop-item ${i===currentIdx?'active':''}" onclick="selectDrop(${i})">
        <div class="drop-item-title">${esc(p.title)}</div>
        <div class="drop-item-cat">${esc(p.category||'')}</div>
      </div>`).join('');
    document.getElementById('dropLabel').textContent = projects[currentIdx]?.title || 'Projects';
  }
  function toggleDrop() {
    const m = document.getElementById('dropMenu'), b = document.getElementById('dropBtn');
    const open = m.classList.toggle('show');
    b.classList.toggle('open', open);
    if (open) document.getElementById('dropSearch').focus();
  }
  function filterDrop() {
    const q = document.getElementById('dropSearch').value.toLowerCase();
    document.querySelectorAll('.drop-item').forEach(el => {
      el.style.display = (el.querySelector('.drop-item-title').textContent.toLowerCase().includes(q) || el.querySelector('.drop-item-cat').textContent.toLowerCase().includes(q)) ? '' : 'none';
    });
  }
  function selectDrop(idx) {
    currentIdx = idx;
    renderDetail();
    toggleDrop();
    const p = projects[idx];
    window.history.pushState({}, '', `${BASE_URL}?project=${encodeURIComponent(p.id)}`);
  }

  /* ── NAV ── */
  function prevProject() { if (currentIdx > 0) { currentIdx--; renderDetail(); window.history.pushState({}, '', `${BASE_URL}?project=${encodeURIComponent(projects[currentIdx].id)}`); } }
  function nextProject() { if (currentIdx < projects.length-1) { currentIdx++; renderDetail(); window.history.pushState({}, '', `${BASE_URL}?project=${encodeURIComponent(projects[currentIdx].id)}`); } }
  function updateNavBtns() {
    document.getElementById('prevBtn').disabled = currentIdx === 0;
    document.getElementById('nextBtn').disabled = currentIdx === projects.length-1;
  }

  /* ── RENDER DETAIL ── */
  function renderDetail() {
    const p = projects[currentIdx];
    if (!p) return;

    // video
    document.getElementById('videoWrap').innerHTML = `<iframe src="https://www.youtube.com/embed/${p.videoId}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>`;

    // dropdown label
    document.getElementById('dropLabel').textContent = p.title;
    populateDrop();
    updateNavBtns();

    const liked = localStorage.getItem(`liked_${p.id}`) === 'true';
    document.getElementById('detailsPane').innerHTML = `
      <div class="d-cat">${esc(p.category)}</div>
      <div class="d-title">${esc(p.title)}</div>
      <div class="d-stats">
        <div class="d-stat">
          <div class="d-stat-label">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Views
          </div>
          <div class="d-stat-val" id="sv" title="${(p.views||0).toLocaleString()}">${fmt(p.views||0)}</div>
        </div>
        <div class="d-stat">
          <div class="d-stat-label">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Likes
          </div>
          <div class="d-stat-val" id="sl" title="${(p.likes||0).toLocaleString()}">${fmt(p.likes||0)}</div>
        </div>
      </div>
      <button class="like-btn" id="likeBtn" onclick="likeProject()" ${liked?'disabled':''}>
        <svg class="${liked?'filled':''}" fill="${liked?'currentColor':'none'}" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
        ${liked ? 'Liked' : 'Like this project'}
      </button>
      <div class="d-block">
        <div class="d-block-label">Description</div>
        <div class="d-block-text">${esc(p.description)}</div>
      </div>
      <div class="d-block">
        <div class="d-block-label">Tools & Technologies</div>
        <div class="d-block-text">${esc(p.tools)}</div>
      </div>
      <div class="d-block">
        <div class="d-block-label">Business Impact</div>
        <div class="d-block-text">${esc(p.outcome)}</div>
        <a href="${p.projectLink}" target="_blank" rel="noopener noreferrer" class="d-link">
          Live project
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7" stroke-width="2" stroke-linecap="round"/><polyline points="7 7 17 7 17 17" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    `;

    // view tracking
    if (!hasViewed(p.id)) {
      sendEv('view', p.id, { ref: new URLSearchParams(window.location.search).get('ref')||'direct' });
      markViewed(p.id);
      projects[currentIdx].views = (p.views||0)+1;
      const el = document.getElementById('sv');
      if (el) { el.classList.add('pop'); el.textContent = fmt(projects[currentIdx].views); setTimeout(()=>el.classList.remove('pop'),400); }
      syncBuf();
    }
  }

  /* ── LIKE ── */
  function likeProject() {
    const p = projects[currentIdx];
    if (localStorage.getItem(`liked_${p.id}`) === 'true') return;
    sendEv('like', p.id, { source:'button' }); syncBuf();
    p.likes = (p.likes||0)+1;
    localStorage.setItem(`liked_${p.id}`, 'true');
    const sl = document.getElementById('sl');
    if (sl) { sl.classList.add('pop'); sl.textContent = fmt(p.likes); setTimeout(()=>sl.classList.remove('pop'),400); }
    const btn = document.getElementById('likeBtn');
    btn.disabled = true;
    btn.innerHTML = `<svg fill="currentColor" viewBox="0 0 24 24" width="16" height="16"><path d="M12 21l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3 9.24 3 10.91 3.81 12 5.08 13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5 22 12.28 18.6 15.36 13.45 19.68L12 21z"/></svg>Liked`;
  }

  /* ── SHARE ── */
  function openShare() {
    const p = projects[currentIdx];
    document.getElementById('sCat').textContent = p.category;
    document.getElementById('sTitle').textContent = p.title;
    document.getElementById('cpBtn').classList.remove('copied');
    document.getElementById('cpLabel').textContent = 'Copy Link';
    document.getElementById('cpSub').textContent = 'Copy URL to clipboard';
    document.getElementById('shareOverlay').classList.add('show');
  }
  function closeShare() { document.getElementById('shareOverlay').classList.remove('show'); }
  function closeShareOnBg(e) { if (e.target === e.currentTarget) closeShare(); }
  function shareLI() { window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(projUrl(projects[currentIdx]))}`, '_blank', 'noopener'); }
  function shareTW() {
    const p = projects[currentIdx], url = projUrl(p);
    const t = `${p.title}\n${(p.description||'').slice(0,120)}...\n${url}\n#${(p.category||'').replace(/\s+/g,'')}`;
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(t)}`, '_blank', 'noopener');
  }
  function shareFB() { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(projUrl(projects[currentIdx]))}`, '_blank', 'noopener'); }
  function copyLink() {
    navigator.clipboard.writeText(projUrl(projects[currentIdx])).then(() => {
      const b = document.getElementById('cpBtn');
      b.classList.add('copied');
      document.getElementById('cpLabel').textContent = 'Copied!';
      document.getElementById('cpSub').textContent = 'Ready to paste anywhere';
      setTimeout(closeShare, 1500);
    });
  }

  /* ── KEYBOARD ── */
  document.addEventListener('keydown', e => {
    const modalOpen = document.getElementById('modal').classList.contains('show');
    const shareOpen = document.getElementById('shareOverlay').classList.contains('show');
    const dropOpen  = document.getElementById('dropMenu').classList.contains('show');
    if (e.key === 'Escape') {
      if (shareOpen) closeShare();
      else if (dropOpen) toggleDrop();
      else if (modalOpen) closeModal();
    }
    if (!modalOpen) return;
    if (e.key === 'ArrowLeft') prevProject();
    if (e.key === 'ArrowRight') nextProject();
  });

  /* ── CLOSE DROPDOWN ON OUTSIDE CLICK ── */
  document.addEventListener('click', e => {
    const drop = document.getElementById('dropMenu'), btn = document.getElementById('dropBtn');
    if (!drop.contains(e.target) && !btn.contains(e.target)) {
      drop.classList.remove('show'); btn.classList.remove('open');
    }
  });

  /* ── POPSTATE ── */
  window.addEventListener('popstate', () => {
    const pid = new URLSearchParams(window.location.search).get('project');
    if (!pid) { closeModal(); return; }
    const idx = projects.findIndex(p => String(p.id) === String(pid));
    if (idx !== -1 && idx !== currentIdx) { currentIdx = idx; openModal(); renderDetail(); }
  });

  /* ── SYNC ON HIDE ── */
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') syncBuf(); });
  window.addEventListener('load', syncBuf);

  /* ── INIT ── */
  fp = getFP();
  loadProjects();
</script>
</body>
</html>
